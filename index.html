<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B5E3C">
  <meta name="description" content="Controle financeiro para padaria artesanal">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Caixa Padaria">
  <title>Padaria — Fluxo de Caixa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layouts.css">
</head>
<body>
  <div id="app">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-screen__content">
        <div class="loading-screen__icon">🍞</div>
        <div class="loading-screen__title">Caixa Padaria</div>
        <div class="loading-screen__spinner"></div>
      </div>
    </div>
    <header id="app-header" class="app-header" hidden></header>
    <main id="app-main" class="app-main"></main>
    <nav id="app-nav" class="bottom-nav" hidden></nav>
  </div>

  <div id="modal-overlay" class="modal-overlay" hidden></div>
  <div id="toast-container" class="toast-container"></div>

  <div id="install-banner" class="install-banner" hidden>
    <span>🍞 Adicionar na tela inicial?</span>
    <button id="btn-instalar" class="btn btn--sm btn--primary">Instalar</button>
    <button id="btn-fechar-banner" class="btn btn--sm btn--ghost">✕</button>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.warn('SW falhou:', err))
      })
    }
    let deferredPrompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault()
      deferredPrompt = e
      setTimeout(() => {
        const banner = document.getElementById('install-banner')
        if (banner) banner.hidden = false
      }, 30000)
    })
    document.addEventListener('click', (e) => {
      if (e.target.id === 'btn-instalar' && deferredPrompt) {
        deferredPrompt.prompt()
        deferredPrompt.userChoice.then(() => {
          document.getElementById('install-banner').hidden = true
          deferredPrompt = null
        })
      }
      if (e.target.id === 'btn-fechar-banner') {
        document.getElementById('install-banner').hidden = true
      }
    })
  </script>
</body>
</html>
